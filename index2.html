<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  <head>
    <script>
      async function add() {
        const a = document.getElementById("first").value;
        const b = document.getElementById("second").value;

        // document.getElementById("response").innerHTML =
        //   parseInt(a) + parseInt(b);

        const res = await fetch(`http://localhost:3000/sum/${a}/${b}`);
        const data = await res.json();
        console.log(data.ans);

        document.getElementById("response").innerHTML = data.ans;
      }
    </script>
  </head>

  <body>
    <input id="first" type="text" placeholder="first number" />
    <input id="second" type="text" placeholder="second number" />

    <button onclick="add()">Add</button>
    <button>Sub</button>
    <button>Div</button>
    <button>Mul</button>

    <div id="response"></div>
  </body>
</html>
